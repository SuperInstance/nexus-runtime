name: NEXUS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  firmware-build:
    name: "Firmware Build (Host)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y gcc cmake make

      - name: Build firmware tests (host)
        run: |
          cd tests/firmware
          mkdir -p build && cd build
          cmake .. -DCMAKE_SOURCE_DIR=${{ github.workspace }}
          make -j$(nproc)

      - name: Run firmware tests
        run: |
          cd tests/firmware/build
          ./test_firmware

  jetson-lint:
    name: "Jetson Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd jetson
          pip install -r requirements.txt

      - name: Ruff check
        run: |
          cd jetson
          python -m ruff check .

      - name: Ruff format check
        run: |
          cd jetson
          python -m ruff format --check .

      - name: MyPy type check
        run: |
          cd jetson
          python -m mypy --ignore-missing-imports nexus_sdk wire_protocol reflex_compiler trust_engine agent_runtime learning
        continue-on-error: true

  jetson-test:
    name: "Jetson Tests"
    runs-on: ubuntu-latest
    needs: [jetson-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd jetson
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          cd ${{ github.workspace }}
          python -m pytest tests/jetson/ -v --tb=short

  c-lint:
    name: "C Lint (clang-format)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check clang-format
        run: |
          find firmware shared tests/firmware -name '*.c' -o -name '*.h' | \
            xargs clang-format --dry-run --Werror
